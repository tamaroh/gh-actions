name: test on pull request
run-name: test
on:
  pull_request:
    branches:
      - main
jobs:
  format-and-lint:
    runs-on: ubuntu-22.04
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup
        uses: actions/setup-node@v3
      - name: install
        run: npm ci
      - name: test
        run: npm test