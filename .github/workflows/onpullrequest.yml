name: test on pull request
run-name: test
on:
  pull_request:
    branches:
      - main
jobs:
  test-including-database:
    runs-on: ubuntu-22.04
    container: node:20-bookworm-slim
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup
        uses: actions/setup-node@v3
      - name: install
        run: npm ci
      - name: connect to psql
        run: npx prisma migrate dev
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/gh_actions?schema=public"
      - name: test
        run: npm test