name: test on pull request
run-name: test
on:
  pull_request:
    branches:
      - main
jobs:
  test-including-database:
    runs-on: ubuntu-22.04
    container: node:lts
    services:
      db:
        image: postgres
        env:
          POSTGRES_USER: ciuser
          POSTGRES_PASSWORD: pw
          POSTGRES_DB: gh_actions
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql://ciuser:pw@db:5432/gh_actions"
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup
        uses: actions/setup-node@v3
      - name: install
        run: npm ci
      - name: connect to psql
        run: npx prisma migrate dev
      - name: test
        run: npm test